<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Simple Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 50px;
      background: #f2f2f2;
      text-align: center;
    }

    .calculator {
      display: inline-block;
      padding: 20px;
      border-radius: 10px;
      background: #fff;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    input[type="number"] {
      width: 100px;
      padding: 8px;
      margin: 10px;
      font-size: 16px;
    }

    select, button {
      padding: 8px;
      font-size: 16px;
      margin: 10px;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
    }
    .bk{
         width: 100px;
        height: 50px;
        font-size: large;
        background-color: rgb(124, 6, 242);
         border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>Simple Calculator</h2>
    <input type="number" id="num1" placeholder="First Number">
    <input type="number" id="num2" placeholder="Second Number">
    
    <br>
    <select id="operator">
      <option value="+">+</option>
      <option value="-">−</option>
      <option value="*">×</option>
      <option value="/">÷</option>
    </select>
    
    <br>
    <button onclick="calculate()">Calculate</button>
    
    <div id="result"></div>
  </div>
  <button class="bk"><a href="index.html">back</a></button>

  <script>
    function calculate() {
      let num1 = parseFloat(document.getElementById('num1').value);
      let num2 = parseFloat(document.getElementById('num2').value);
      let operator = document.getElementById('operator').value;
      let result;

      if (isNaN(num1) || isNaN(num2)) {
        result = "Please enter valid numbers.";
      } else {
        switch(operator) {
          case '+':
            result = num1 + num2;
            break;
          case '-':
            result = num1 - num2;
            break;
          case '*':
            result = num1 * num2;
            break;
          case '/':
            result = num2 !== 0 ? num1 / num2 : "Error: Division by zero";
            break;
        }
      }

      document.getElementById('result').innerText = "Result: " + result;
    }
  </script>
</body>
</html>
